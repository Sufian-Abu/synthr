<svg width="100%" viewBox="0 0 680 758" role="img" xmlns="http://www.w3.org/2000/svg" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif">
  <title>Synthr — AI gateway architecture (SDKs, REST, CLI)</title>
  <desc>Frontend, backend (JS and Python), and CLI/REST engineers all connect to the self-hosted Synthr gateway, which handles auth, guardrails, rate limiting, caching, and routes to AI providers.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .sec   { fill:#3d3d3a; font-size:12px; text-anchor:middle; }
      .o45   { opacity:.45; } .o55 { opacity:.55; }
      .t     { font-size:14px; font-weight:500; text-anchor:middle; dominant-baseline:central; }
      .s     { font-size:12px; text-anchor:middle; dominant-baseline:central; }
      rect   { rx:8; stroke-width:.5; }
      line   { stroke:#73726c; stroke-width:1.5; fill:none; }
      .client{ fill:#eeedfe; stroke:#534ab7; } .client-t{ fill:#3c3489; } .client-s{ fill:#534ab7; }
      .green { fill:#e1f5ee; stroke:#0f6e56; } .green-t{ fill:#085041; } .green-s{ fill:#0f6e56; }
      .orange{ fill:#faece7; stroke:#993c1d; } .orange-t{ fill:#712b13; } .orange-s{ fill:#993c1d; }
      .gw    { fill:#e6f1fb; stroke:#185fa5; } .gw-t{ fill:#0c447c; } .gw-s{ fill:#185fa5; }
      .gray  { fill:#f1efe8; stroke:#5f5e5a; } .gray-t{ fill:#5f5e5a; } .bar-t{ fill:#444441; }
      .amber { fill:#faeeda; stroke:#854f0b; } .amber-t{ fill:#633806; } .amber-s{ fill:#854f0b; }
      .prop  { fill:#eaf3de; stroke:#3b6d11; } .prop-t{ fill:#27500a; } .prop-s{ fill:#3b6d11; }
    </style>
  </defs>

  <!-- ENGINEERS -->
  <text class="sec o45" x="340" y="20">Any engineer · any stack · any project</text>
  <rect class="client" x="22"  y="30" width="142" height="50"/>
  <text class="t client-t" x="93"  y="51">Frontend</text><text class="s client-s" x="93"  y="68">React · Vue · JS</text>
  <rect class="client" x="174" y="30" width="142" height="50"/>
  <text class="t client-t" x="245" y="51">Backend JS/TS</text><text class="s client-s" x="245" y="68">Node · Express · Next</text>
  <rect class="client" x="326" y="30" width="142" height="50"/>
  <text class="t client-t" x="397" y="51">Backend Python</text><text class="s client-s" x="397" y="68">FastAPI · Django</text>
  <rect class="client" x="478" y="30" width="180" height="50"/>
  <text class="t client-t" x="568" y="51">CLI / Any stack</text><text class="s client-s" x="568" y="68">Go · Ruby · PHP · Mobile</text>

  <!-- ACCESS / SDK ROW -->
  <text class="sec o45" x="340" y="102">Choose your integration method</text>
  <rect class="green"  x="22"  y="112" width="294" height="42"/>
  <text class="t green-t" x="169" y="129">synthr-sdk</text><text class="s green-s" x="169" y="146">npm — JS · TS · Node</text>
  <rect class="green"  x="326" y="112" width="142" height="42"/>
  <text class="t green-t" x="397" y="129">synthr</text><text class="s green-s" x="397" y="146">pip — Python</text>
  <rect class="orange" x="478" y="112" width="180" height="42"/>
  <text class="t orange-t" x="568" y="129">REST · OpenAI SDK</text><text class="s orange-s" x="568" y="146">curl · openai · HTTP</text>

  <!-- arrows: engineers -> access -->
  <line x1="93"  y1="80" x2="120" y2="110" marker-end="url(#arrow)"/>
  <line x1="245" y1="80" x2="220" y2="110" marker-end="url(#arrow)"/>
  <line x1="397" y1="80" x2="397" y2="110" marker-end="url(#arrow)"/>
  <line x1="568" y1="80" x2="568" y2="110" marker-end="url(#arrow)"/>
  <!-- arrows: access -> gateway -->
  <line x1="169" y1="154" x2="260" y2="210" marker-end="url(#arrow)"/>
  <line x1="397" y1="154" x2="360" y2="210" marker-end="url(#arrow)"/>
  <line x1="568" y1="154" x2="440" y2="210" marker-end="url(#arrow)"/>

  <!-- GATEWAY CONTAINER -->
  <rect class="gw" x="30" y="212" width="620" height="410" rx="14" stroke-width="1"/>
  <text class="t gw-t" x="340" y="240">Synthr Gateway</text>
  <text class="s gw-s" x="340" y="258">Self-hosted · one Docker command · synthr.config.yaml</text>

  <!-- pipeline -->
  <text class="sec o55" x="340" y="282">Request pipeline — runs on every call, invisible to the engineer</text>
  <rect class="green" x="46"  y="292" width="108" height="58" rx="6"/>
  <text class="t green-t" x="100" y="313">Auth</text><text class="s green-s" x="100" y="331">Project key</text>
  <line x1="154" y1="321" x2="166" y2="321" marker-end="url(#arrow)"/>
  <rect class="green" x="166" y="292" width="108" height="58" rx="6"/>
  <text class="t green-t" x="220" y="313">Guardrails</text><text class="s green-s" x="220" y="331">PII · keywords</text>
  <line x1="274" y1="321" x2="286" y2="321" marker-end="url(#arrow)"/>
  <rect class="green" x="286" y="292" width="108" height="58" rx="6"/>
  <text class="t green-t" x="340" y="313">Rate limit</text><text class="s green-s" x="340" y="331">User · project</text>
  <line x1="394" y1="321" x2="406" y2="321" marker-end="url(#arrow)"/>
  <rect class="green" x="406" y="292" width="108" height="58" rx="6"/>
  <text class="t green-t" x="460" y="313">Cache</text><text class="s green-s" x="460" y="331">Semantic match</text>
  <line x1="514" y1="321" x2="526" y2="321" marker-end="url(#arrow)"/>
  <rect class="green" x="526" y="292" width="108" height="58" rx="6"/>
  <text class="t green-t" x="580" y="313">Optimizer</text><text class="s green-s" x="580" y="331">Compress tokens</text>

  <!-- features -->
  <text class="sec o55" x="340" y="372">Built-in AI features — call by name, no prompt engineering</text>
  <rect class="gray" x="46"  y="382" width="110" height="36" rx="6"/><text class="s gray-t" x="101" y="400">Form autofill</text>
  <rect class="gray" x="166" y="382" width="110" height="36" rx="6"/><text class="s gray-t" x="221" y="400">Image generate</text>
  <rect class="gray" x="286" y="382" width="110" height="36" rx="6"/><text class="s gray-t" x="341" y="400">BG removal</text>
  <rect class="gray" x="406" y="382" width="110" height="36" rx="6"/><text class="s gray-t" x="461" y="400">Summarize</text>
  <rect class="gray" x="526" y="382" width="108" height="36" rx="6"/><text class="s gray-t" x="580" y="400">Translate · more</text>

  <!-- providers -->
  <text class="sec o55" x="340" y="436">Provider abstraction — fallback chain, swap with one config line</text>
  <rect class="amber" x="46"  y="446" width="138" height="44" rx="6"/>
  <text class="t amber-t" x="115" y="464">Gemini</text><text class="s amber-s" x="115" y="481">default</text>
  <rect class="amber" x="194" y="446" width="138" height="44" rx="6"/>
  <text class="t amber-t" x="263" y="464">OpenAI</text><text class="s amber-s" x="263" y="481">optional</text>
  <rect class="amber" x="342" y="446" width="138" height="44" rx="6"/>
  <text class="t amber-t" x="411" y="464">Groq</text><text class="s amber-s" x="411" y="481">fast · optional</text>
  <rect class="amber" x="490" y="446" width="144" height="44" rx="6"/>
  <text class="t amber-t" x="562" y="464">Ollama</text><text class="s amber-s" x="562" y="481">local fallback</text>

  <!-- CLI -->
  <text class="sec o55" x="340" y="512">CLI — manage the gateway from your terminal</text>
  <rect class="orange" x="46"  y="522" width="138" height="44" rx="6"/>
  <text class="t orange-t" x="115" y="540">synthr init</text><text class="s orange-s" x="115" y="557">Scaffold config</text>
  <rect class="orange" x="194" y="522" width="138" height="44" rx="6"/>
  <text class="t orange-t" x="263" y="540">synthr-gateway</text><text class="s orange-s" x="263" y="557">Boot the server</text>
  <rect class="orange" x="342" y="522" width="138" height="44" rx="6"/>
  <text class="t orange-t" x="411" y="540">synthr keygen</text><text class="s orange-s" x="411" y="557">Create project key</text>
  <rect class="orange" x="490" y="522" width="144" height="44" rx="6"/>
  <text class="t orange-t" x="562" y="540">synthr status</text><text class="s orange-s" x="562" y="557">Health · usage · cost</text>

  <!-- config -->
  <rect class="gray" x="140" y="578" width="400" height="36"/>
  <text class="t bar-t" x="340" y="596">synthr.config.yaml — providers · limits · guardrails · cache</text>

  <!-- VALUE PROPS -->
  <text class="sec o45" x="340" y="638">What makes it unique</text>
  <rect class="prop" x="30"  y="648" width="150" height="46"/>
  <text class="t prop-t" x="105" y="666">Zero setup</text><text class="s prop-s" x="105" y="683">per project, ever again</text>
  <rect class="prop" x="190" y="648" width="150" height="46"/>
  <text class="t prop-t" x="265" y="666">Provider-agnostic</text><text class="s prop-s" x="265" y="683">one-line config swap</text>
  <rect class="prop" x="350" y="648" width="150" height="46"/>
  <text class="t prop-t" x="425" y="666">Cost control</text><text class="s prop-s" x="425" y="683">cache · caps · optimizer</text>
  <rect class="prop" x="510" y="648" width="140" height="46"/>
  <text class="t prop-t" x="580" y="666">100% free</text><text class="s prop-s" x="580" y="683">self-hosted · your keys</text>

  <!-- DASHBOARD -->
  <rect class="gray" x="140" y="706" width="400" height="36"/>
  <text class="t bar-t" x="340" y="724">Dashboard — cost · cache hits · guardrail events · per-project</text>
</svg>
