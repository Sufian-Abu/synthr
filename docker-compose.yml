# One command: docker compose up
# Mounts your config + .env; persists the SQLite store in a named volume.
services:
  gateway:
    build: .
    image: synthr/gateway:dev
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Your config overrides the baked default. Set db_path: /data/synthr.db for persistence.
      - ./synthr.config.yaml:/app/synthr.config.yaml:ro
      - synthr-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

volumes:
  synthr-data:
